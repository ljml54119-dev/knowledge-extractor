<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Knowledge Extractor</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--purple:#a855f7;--purple-dim:rgba(168,85,247,.25);--green:#34d399}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;
    background:linear-gradient(to bottom right,#0f172a,#581c87,#312e81);
    color:#f3f4f6;min-height:100vh;display:flex;justify-content:center;padding:24px 16px 80px;overflow-x:hidden
  }
  .aurora{position:fixed;border-radius:50%;filter:blur(120px);opacity:.3;pointer-events:none;z-index:0}
  .aurora-1{width:500px;height:500px;background:radial-gradient(circle,#a855f7 0,transparent 70%);top:-10%;left:-5%;animation:float 20s ease-in-out infinite}
  .aurora-2{width:400px;height:400px;background:radial-gradient(circle,#06b6d4 0,transparent 70%);top:40%;right:-8%;animation:float 20s ease-in-out infinite -7s}
  .aurora-3{width:450px;height:450px;background:radial-gradient(circle,#f472b6 0,transparent 70%);bottom:-10%;left:30%;animation:float 20s ease-in-out infinite -14s}
  @keyframes float{0%,100%{transform:translate(0) scale(1)}25%{transform:translate(30px,-40px) scale(1.1)}50%{transform:translate(-20px,20px) scale(.95)}75%{transform:translate(-40px,-20px) scale(1.05)}}
  @keyframes pulse{50%{opacity:.5}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

  .container{position:relative;z-index:10;width:100%;max-width:720px;display:flex;flex-direction:column;gap:20px}
  .header{text-align:center;margin-bottom:4px}
  .header h1{font-size:2.2rem;font-weight:700;background:linear-gradient(to right,#a5b4fc,#d8b4fe,#f9a8d4);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px}
  .header p{color:#9ca3af;font-size:.9rem}

  .glass{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:1rem;padding:24px;box-shadow:0 20px 25px -5px rgba(0,0,0,.1),0 0 40px rgba(168,85,247,.08);animation:fadeIn .35s ease-out}
  .card-label{font-size:.8rem;font-weight:600;color:#c084fc;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}

  .upload-zone{border:2px dashed rgba(192,132,252,.3);border-radius:.75rem;padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s}
  .upload-zone:hover,.upload-zone.drag-over{border-color:var(--purple);background:rgba(168,85,247,.08)}
  .upload-zone.drag-over{box-shadow:0 0 24px rgba(168,85,247,.2)}
  .upload-zone.has-image{padding:16px;border-style:solid;border-color:rgba(52,211,153,.3)}
  .upload-icon{font-size:40px;margin-bottom:10px}
  .upload-text{font-size:.95rem;color:#d1d5db}
  .upload-hint{font-size:.78rem;color:#6b7280;margin-top:5px}

  .preview-img{max-width:100%;max-height:320px;border-radius:.5rem;display:none}
  .preview-img.visible{display:block;margin:0 auto}
  .remove-btn{display:none;margin-top:10px;padding:5px 14px;border:1px solid rgba(248,113,113,.5);background:rgba(248,113,113,.08);color:#fca5a5;border-radius:.5rem;font-size:.78rem;cursor:pointer;transition:all .15s}
  .remove-btn:hover{background:rgba(248,113,113,.18)}
  .remove-btn.visible{display:inline-block}

  .btn-row{display:flex;gap:10px}
  .btn-row .generate-btn{flex:1}
  .generate-btn,.demo-btn{padding:14px 20px;border:none;color:#fff;border-radius:.75rem;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
  .generate-btn{background:linear-gradient(to right,#6366f1,#a855f7);box-shadow:0 4px 16px rgba(168,85,247,.3)}
  .generate-btn:hover:not(:disabled){box-shadow:0 6px 24px rgba(168,85,247,.45);transform:translateY(-1px)}
  .generate-btn:active:not(:disabled){transform:scale(.98)}
  .generate-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
  .demo-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#d1d5db;font-size:.85rem;font-weight:500;white-space:nowrap}
  .demo-btn:hover{background:rgba(255,255,255,.14);color:#fff}

  .progress-panel{display:none}
  .progress-panel.visible{display:block}
  .progress-steps{display:flex;gap:4px;margin-bottom:16px}
  .progress-step{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.08);transition:background .4s,box-shadow .4s}
  .progress-step.active{background:var(--purple);box-shadow:0 0 8px rgba(168,85,247,.5)}
  .progress-step.done{background:var(--green)}
  .progress-label{font-size:.85rem;color:var(--purple);font-weight:500;display:flex;align-items:center;gap:8px}
  .progress-dot{width:7px;height:7px;border-radius:50%;background:var(--purple);animation:pulse 1.2s ease-in-out infinite}

  .stream-output{font-size:.9rem;line-height:1.75;color:#d1d5db;max-height:300px;overflow-y:auto;padding-right:8px;word-break:break-word}
  .stream-output .cursor::after{content:'▍';color:var(--purple);animation:pulse 1s step-end infinite}

  .result-card{display:none}
  .result-card.visible{display:block}
  .result-content{line-height:1.85;font-size:.95rem;color:#e5e7eb}
  .result-content h2{font-size:1.15rem;font-weight:600;color:#d8b4fe;margin:24px 0 10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08)}
  .result-content h3{font-size:1.05rem;font-weight:600;color:#c7d2fe;margin:18px 0 8px}
  .result-content h4{font-size:.95rem;font-weight:600;color:#e5e7eb;margin:14px 0 6px}
  .result-content p{margin:8px 0}
  .result-content ul,.result-content ol{padding-left:22px;margin:10px 0}
  .result-content li{margin:5px 0;color:#d1d5db}
  .result-content li::marker{color:#8b5cf6}
  .result-content strong{color:#fbbf24;font-weight:600}
  .result-content em{color:#c084fc}
  .result-content code{background:rgba(255,255,255,.08);padding:2px 7px;border-radius:4px;font-size:.82rem;color:#f9a8d4;font-family:ui-monospace,SFMono-Regular,monospace}
  .result-content pre{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);padding:16px;border-radius:.5rem;overflow-x:auto;font-size:.82rem;margin:14px 0;line-height:1.6}
  .result-content pre code{background:none;padding:0;color:#e2e8f0}
  .result-content blockquote{border-left:3px solid #a855f7;padding:4px 0 4px 16px;color:#9ca3af;margin:14px 0;font-style:italic}
  .result-content table{border-collapse:collapse;width:100%;margin:14px 0;font-size:.88rem}
  .result-content th,.result-content td{border:1px solid rgba(255,255,255,.1);padding:10px 14px;text-align:left}
  .result-content th{background:rgba(168,85,247,.15);font-weight:600;color:#d8b4fe}
  .result-content hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:20px 0}

  .cache-badge{display:none;font-size:.7rem;padding:3px 10px;border-radius:20px;background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
  .cache-badge.visible{display:inline-block}

  .actions-row{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;align-items:center}
  .action-time{font-size:.75rem;color:#6b7280;margin-right:auto;display:none}
  .action-time.visible{display:block}
  .copy-btn{padding:8px 18px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#d1d5db;border-radius:.5rem;font-size:.82rem;cursor:pointer;transition:all .15s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .copy-btn:hover{background:rgba(255,255,255,.12);color:#fff}
  input[type=file]{display:none}
</style>
</head>
<body>
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>
<div class="aurora aurora-3"></div>

<div class="container">
  <div class="header">
    <h1>AI Knowledge Extractor</h1>
    <p>上传图片，AI 即时提取核心知识点</p>
  </div>

  <div class="glass">
    <div class="card-label">上传图片</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" />
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">点击选择图片或拖拽到此处</div>
      <div class="upload-hint">JPG / PNG / WebP / GIF，最大 10MB</div>
      <img id="preview" class="preview-img" alt="Preview" />
    </div>
    <div style="text-align:center"><button class="remove-btn" id="removeBtn">移除图片</button></div>
  </div>

  <div class="btn-row">
    <button class="generate-btn" id="generateBtn" disabled>生成知识点</button>
    <button class="demo-btn" id="demoBtn">体验 Demo</button>
  </div>

  <div class="glass progress-panel" id="progressPanel">
    <div class="card-label" id="progressLabel">处理中...</div>
    <div class="progress-steps">
      <div class="progress-step" id="step1"></div>
      <div class="progress-step" id="step2"></div>
      <div class="progress-step" id="step3"></div>
      <div class="progress-step" id="step4"></div>
    </div>
    <div class="stream-output" id="streamOutput"></div>
  </div>

  <div class="glass result-card" id="resultCard">
    <div class="card-label">分析结果</div>
    <div class="result-content" id="resultContent"></div>
    <div class="actions-row">
      <span class="action-time" id="actionTime"></span>
      <span class="cache-badge" id="cacheBadge">缓存命中</span>
      <button class="copy-btn" id="copyBtn">复制内容</button>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";
  function $(sel) { return document.querySelector(sel); }

  var uploadZone = $('#uploadZone'), fileInput = $('#fileInput');
  var preview = $('#preview'), removeBtn = $('#removeBtn');
  var generateBtn = $('#generateBtn'), demoBtn = $('#demoBtn');
  var progressPanel = $('#progressPanel'), progressLabel = $('#progressLabel');
  var streamOutput = $('#streamOutput');
  var resultCard = $('#resultCard'), resultContent = $('#resultContent');
  var copyBtn = $('#copyBtn'), cacheBadge = $('#cacheBadge');
  var actionTime = $('#actionTime');
  var stepEls = [$('#step1'), $('#step2'), $('#step3'), $('#step4')];

  var imageBase64 = null, resultText = '';
  var abortCtrl = null;

  // ---- File upload ----
  uploadZone.addEventListener('click', function(e) {
    if (e.target !== removeBtn && e.target !== preview) fileInput.click();
  });
  uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', function() { uploadZone.classList.remove('drag-over'); });
  uploadZone.addEventListener('drop', function(e) {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    var f = e.dataTransfer.files[0];
    if (f && f.type.indexOf('image/') === 0) handleFile(f);
  });
  fileInput.addEventListener('change', function() {
    var f = fileInput.files[0];
    if (f) handleFile(f);
  });
  removeBtn.addEventListener('click', resetUpload);

  function handleFile(file) {
    if (file.size > 10*1024*1024) { showError('文件超过 10MB 限制'); return; }
    var reader = new FileReader();
    reader.onload = function() {
      imageBase64 = { data: reader.result.split(',')[1], mime: file.type };
      preview.src = reader.result;
      preview.classList.add('visible');
      removeBtn.classList.add('visible');
      uploadZone.classList.add('has-image');
      uploadZone.querySelector('.upload-icon').style.display = 'none';
      uploadZone.querySelector('.upload-text').style.display = 'none';
      uploadZone.querySelector('.upload-hint').style.display = 'none';
      generateBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  }

  function resetUpload() {
    imageBase64 = null; preview.src = ''; preview.classList.remove('visible');
    removeBtn.classList.remove('visible'); uploadZone.classList.remove('has-image');
    uploadZone.querySelector('.upload-icon').style.display = '';
    uploadZone.querySelector('.upload-text').style.display = '';
    uploadZone.querySelector('.upload-hint').style.display = '';
    generateBtn.disabled = true; fileInput.value = '';
  }

  // ---- Progress bar ----
  function showProgress(label) {
    progressPanel.classList.add('visible');
    progressLabel.textContent = label;
  }
  function markDone() {
    for (var i = 0; i < stepEls.length; i++) { stepEls[i].className = 'progress-step done'; }
    progressLabel.textContent = '完成';
  }
  function resetProgress() {
    progressPanel.classList.remove('visible');
    streamOutput.textContent = '';
    for (var i = 0; i < stepEls.length; i++) { stepEls[i].className = 'progress-step'; }
  }
  function updateStep(idx) {
    for (var i = 0; i < stepEls.length; i++) {
      if (i < idx) stepEls[i].className = 'progress-step done';
      else if (i === idx) stepEls[i].className = 'progress-step active';
      else stepEls[i].className = 'progress-step';
    }
  }
  function showError(msg) {
    cacheBadge.classList.remove('visible');
    actionTime.classList.remove('visible');
    resultContent.innerHTML = '<p style="color:#fca5a5">' + escapeHtml(msg) + '</p>';
    resultCard.classList.add('visible');
    resetProgress();
  }

  // ---- SSE parser ----
  function parseSSEFrame(frame) {
    var eventType = '', data = '';
    var lines = frame.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.indexOf('event: ') === 0) eventType = line.slice(7).trim();
      else if (line.indexOf('data: ') === 0) data = line.slice(6);
    }
    return { event: eventType, data: data };
  }

  // ---- Demo ----
  demoBtn.addEventListener('click', runDemo);
  function runDemo() {
    var demoB64 = 'iVBORw0KGgoAAAANSUhEUgAAAGQAAABkCAYAAABw4pVUAAAAqklEQVR4nO3WsRGAMBAEQf49C+cv' +
      'bLsZ0iBYU8d4l6OusP8MjfMz7gAAK64BdQAAriwBdQAAriwBdQAAriwBdQAAriwBdQAAriwBdQAAriz/' +
      'EdhHe39WHd+Z3A30zN/0Y0mXu2mvf8MN6B+BeZkzSFssJ1y+nxRcDTbPwQcET+4YF1BE7eP0EAi4a8' +
      'HQjQF5+nbgD+ZPwP7/n23uA8q4AAEANwDYfAJd/q2pQAAAABJRU5ErkJggg==';
    imageBase64 = { data: demoB64, mime: 'image/png' };
    preview.src = 'data:image/png;base64,' + demoB64;
    preview.classList.add('visible');
    removeBtn.classList.add('visible');
    uploadZone.classList.add('has-image');
    uploadZone.querySelector('.upload-icon').style.display = 'none';
    uploadZone.querySelector('.upload-text').style.display = 'none';
    uploadZone.querySelector('.upload-hint').style.display = 'none';
    generateBtn.disabled = false;
    runGeneration();
  }

  // ---- Streaming fetch ----
  generateBtn.addEventListener('click', runGeneration);

  function runGeneration() {
    if (!imageBase64) { showError('请先上传图片'); return; }
    if (abortCtrl) abortCtrl.abort();
    abortCtrl = new AbortController();

    resetProgress();
    resultCard.classList.remove('visible');
    cacheBadge.classList.remove('visible');
    actionTime.classList.remove('visible');
    streamOutput.textContent = '';
    generateBtn.disabled = true;
    resultText = '';
    var t0 = performance.now();
    var steps = ['正在分析图片...', '正在提取知识...', '正在组织内容...', '生成最终结果...'];

    showProgress('正在准备...');
    updateStep(0);

    fetch('/api/summarize/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageBase64.data, mime: imageBase64.mime }),
      signal: abortCtrl.signal,
    }).then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.body.getReader();
    }).then(function(reader) {
      var decoder = new TextDecoder();
      var buffer = '';
      var streamText = '';
      var chunkCount = 0;

      function pump() {
        reader.read().then(function(result) {
          if (result.done) {
            generateBtn.disabled = false;
            abortCtrl = null;
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            return;
          }
          buffer += decoder.decode(result.value, { stream: true });

          while (true) {
            var idx = buffer.indexOf('\n\n');
            if (idx === -1) break;
            var frame = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            var parsed = parseSSEFrame(frame);
            if (!parsed.data) continue;
            var data;
            try { data = JSON.parse(parsed.data); } catch(e) { continue; }

            switch (parsed.event) {
              case 'cached':
                resultContent.innerHTML = data.html;
                resultText = data.text;
                resultCard.classList.add('visible');
                cacheBadge.classList.add('visible');
                progressPanel.classList.remove('visible');
                markDone();
                actionTime.classList.add('visible');
                actionTime.textContent = (performance.now() - t0).toFixed(0) + 'ms (缓存)';
                return;
              case 'chunk':
                streamText += data.delta;
                streamOutput.innerHTML = renderPartialMarkdown(streamText) + '<span class="cursor"></span>';
                streamOutput.scrollTop = streamOutput.scrollHeight;
                chunkCount++;
                if (chunkCount % 3 === 0) {
                  var s = Math.min(Math.floor(chunkCount / 3), steps.length - 1);
                  showProgress(steps[s]);
                  updateStep(s);
                }
                break;
              case 'rendered':
                resultContent.innerHTML = data.html;
                resultText = data.text;
                resultCard.classList.add('visible');
                streamOutput.textContent = '';
                markDone();
                updateStep(4);
                actionTime.classList.add('visible');
                actionTime.textContent = (performance.now() - t0).toFixed(0) + 'ms';
                break;
              case 'error':
                showError(data.error);
                return;
            }
          }
          pump();
        }).catch(function(err) {
          if (err.name !== 'AbortError') showError(err.message);
          generateBtn.disabled = false;
          abortCtrl = null;
        });
      }
      pump();
    }).catch(function(err) {
      if (err.name !== 'AbortError') showError(err.message);
      generateBtn.disabled = false;
      abortCtrl = null;
    });
  }

  function renderPartialMarkdown(md) {
    return escapeHtml(md)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
  }
  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(resultText).then(function() {
      copyBtn.textContent = '已复制!';
      setTimeout(function() { copyBtn.textContent = '复制内容'; }, 2000);
    });
  });
})();
</script>
</body>
</html>
